<section class="screen" data-screen="settings-business-hours">
  <header class="screen-header">
    <h1>Settings · Business Hours</h1>
    <p class="subtitle">Configure weekly hours and one-off date exceptions.</p>
  </header>

  <div id="bh-banner" class="banner" hidden></div>

  <div class="card">
    <h3>Weekly Hours</h3>
    <p class="subtitle">Set your standard weekly schedule.</p>
    <div style="overflow:auto;">
      <table class="table" style="width:100%; min-width:600px;">
        <thead>
          <tr>
            <th>Day</th>
            <th>Closed</th>
            <th>Open</th>
            <th>Close</th>
          </tr>
        </thead>
        <tbody id="bh-weekly-body"></tbody>
      </table>
    </div>
    <div class="actions" style="margin-top:10px;">
      <button id="bh-save-weekly" class="btn btn--primary">Save Weekly Hours</button>
    </div>
  </div>

  <div class="card" style="margin-top:12px;">
    <h3>Date Exceptions</h3>
    <p class="subtitle">Override one specific date (holiday, event, etc.).</p>

    <div class="grid grid-4" style="gap:10px; align-items:end;">
      <label>
        <span>Date</span>
        <input id="bh-ex-date" type="date" class="input" />
      </label>
      <label>
        <span>Closed</span>
        <select id="bh-ex-closed" class="input">
          <option value="true">Closed</option>
          <option value="false">Open</option>
        </select>
      </label>
      <label>
        <span>Open</span>
        <input id="bh-ex-open" type="time" class="input" />
      </label>
      <label>
        <span>Close</span>
        <input id="bh-ex-close" type="time" class="input" />
      </label>
    </div>

    <label style="display:block; margin-top:10px;">
      <span>Reason (optional)</span>
      <input id="bh-ex-reason" type="text" class="input" maxlength="200" placeholder="Holiday, special event, etc." />
    </label>

    <div class="actions" style="margin-top:10px;">
      <button id="bh-save-ex" class="btn btn--primary">Save Exception</button>
    </div>

    <div style="overflow:auto; margin-top:12px;">
      <table class="table" style="width:100%; min-width:600px;">
        <thead>
          <tr>
            <th>Date</th>
            <th>Status</th>
            <th>Hours</th>
            <th>Reason</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="bh-ex-body"></tbody>
      </table>
    </div>
  </div>
</section>
